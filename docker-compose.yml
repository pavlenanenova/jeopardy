services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jeopardy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jeopardy}
      POSTGRES_DB: ${POSTGRES_DB:-jeopardy}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jeopardy}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jeopardy}:${POSTGRES_PASSWORD:-jeopardy}@db:5432/${POSTGRES_DB:-jeopardy}
      DATASET_URL: ${DATASET_URL:-https://raw.githubusercontent.com/russmatney/go-jeopardy/master/JEOPARDY_CSV.csv}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - csv_data:/app/data
      - .:/app
    command: >
      sh -c "alembic upgrade head && python scripts/ingest_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

volumes:
  postgres_data:
  csv_data: